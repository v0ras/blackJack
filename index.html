<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack | 21</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="scoreboard">
      <div class="info-box">
        <h3>🎴 KALADĖJE</h3>
        <p id="cardsLeft">52</p>
      </div>
      <div class="info-box">
        <h3>⭐ Tavo TAŠKAI</h3>
        <p id="playerPoints">0</p>
      </div>
      <div class="info-box">
        <h3>🤖 Kompiuterio TAŠKAI</h3>
        <p id="compPoints">0</p>
      </div>
    </div>

    <div class="game-area">
      <div class="cards-section">
        <h3>🧑‍💼 Tavo kortos</h3>
        <div id="playerCards" class="cards"></div>
      </div>
      <div class="cards-section">
        <h3>💻 Kompiuterio kortos</h3>
        <div id="compCards" class="cards"></div>
      </div>
    </div>

    <div class="controls" id="controls">
      <button id="startBtn">🃏 Naujas žaidimas</button>
    </div>

    <div id="message" class="message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
